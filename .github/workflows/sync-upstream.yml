name: Sync upstream HydraLLM ui/

# 监听上游 HydraLLM 的 ui/ 目录变化，自动同步到本仓库 ui/ 目录。
# 同步成功后 main 分支更新，Cloudflare Pages Git 集成会自动重新部署。
#
# 触发方式：
#   - schedule: 每小时整点自动检查（UTC）
#   - workflow_dispatch: 在 Actions 页面手动触发
#   - repository_dispatch: 外部 webhook 可调用触发（用于上游 push webhook）
#     curl -X POST -H "Accept: application/vnd.github+json" \
#       -d '{"event_type":"sync-upstream"}' \
#       https://api.github.com/repos/clockclock1/hydrallm-demo/dispatches

on:
  schedule:
    # 每小时整点检查（UTC 时间，对应北京时间整点 + 8h）
    # GitHub schedule 最小粒度是 5min，但整点触发最可靠
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [sync-upstream]

permissions:
  contents: write

jobs:
  sync:
    name: Sync ui/ from upstream
    runs-on: ubuntu-latest
    # 平台默认会给 schedule 加延迟，timeout 避免堆积
    timeout-minutes: 10

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Probe upstream HEAD SHA
        id: probe
        run: |
          set -e
          # 用 GitHub API 拿到上游 HEAD SHA，无需 clone
          UPSTREAM_SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/clockclock1/HydraLLM/commits/main \
            | jq -r '.sha')
          echo "Upstream HEAD: $UPSTREAM_SHA"

          # 从我们仓库已有的同步提交信息里解析上次同步到的 SHA
          LAST_SYNC=$(git log -1 --pretty=%B --grep='^chore(sync):' ui/src/ 2>/dev/null \
            | grep -oE 'HydraLLM@[a-f0-9]+' | head -1 | cut -d@ -f2 || true)
          echo "Last synced: ${LAST_SYNC:-none}"

          if [ -n "$LAST_SYNC" ] && [ "$UPSTREAM_SHA" = "$LAST_SYNC" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ Upstream HEAD unchanged, skipping sync"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
            echo "→ Upstream updated, will sync"
          fi

      - name: Clone upstream HydraLLM
        if: steps.probe.outputs.skip == 'false'
        run: |
          git clone --depth 1 \
            https://github.com/clockclock1/HydraLLM.git /tmp/hydra

      - name: Sync ui/src/ from upstream
        if: steps.probe.outputs.skip == 'false'
        run: |
          set -e
          echo "==== Before sync ===="
          ls -la ui/src/ || true

          # 只同步 src/ 目录（保留 vite.config.ts、index.html、package.json
          # 这三份是针对 Cloudflare Pages 演示环境定制的）
          rm -rf ui/src
          cp -r /tmp/hydra/ui/src ui/src

          echo "==== After sync ===="
          ls -la ui/src/

      # ============================================================
      # Cloudflare Pages 演示路由适配：给 pagePaths 加上 /ui/ 前缀
      #
      # 背景：React UI 用 history.pushState 做客户端路由，
      # pagePaths 定义每个页面的 URL（App.tsx 的 syncRoute 用它做 replaceState）。
      #
      # Cloudflare Pages 部署在 /ui/ 子目录，入口是 /ui/（不要用 /ui/index.html，
      # CF Pages 默认对 /ui/index.html 返回 308 → /ui/，会破坏 _redirects rewrite）。
      # 如果 pagePaths 用根路径（如 /dashboard），React UI 会把 URL 改写成 /dashboard，
      # 用户刷新时 CF Pages 没有对根路径 /dashboard 的 fallback，导致回落到 Vue 着陆页。
      #
      # 解决方案：把 pagePaths 块内的路径全部加上 /ui/ 前缀。
      # 这样 React UI 的 URL 永远带 /ui/ 前缀，_redirects 的 /ui/* 通配符统一处理。
      #
      # 实现用 Python（Actions ubuntu runner 自带），不硬编码页面名，
      # 用正则只给 pagePaths 对象字面量里的 '/xxx' 加前缀（跳过已带 /ui/ 的），
      # 上游增删路径也能自动适配。
      #
      # 这个 patch 必须在每次同步后执行，因为 rm -rf ui/src 会覆盖它。
      # ============================================================
      - name: Patch routing — add /ui/ prefix to pagePaths
        if: steps.probe.outputs.skip == 'false'
        run: |
          set -e
          PAGES_INDEX="ui/src/pages/index.tsx"
          if [ ! -f "$PAGES_INDEX" ]; then
            echo "⚠️  $PAGES_INDEX not found, skipping patch"
            exit 0
          fi
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("ui/src/pages/index.tsx")
          src = p.read_text(encoding="utf-8")

          # 仅在 pagePaths 的对象字面量块内（export const pagePaths = { ... };）做替换。
          # 匹配形如 '/xxx' 或 "/xxx" 的字符串字面量，xxx 不以 /ui/ 开头且不含空白，
          # 替换为 '/ui/xxx'。保留原引号风格。
          pattern = re.compile(
              r"(export const pagePaths[^=]*=\s*\{)(.*?)(\};)",
              re.DOTALL
          )

          def add_prefix(body: str) -> str:
              # 给 body 中形如 '/xxx' 或 "/xxx" 且未带 /ui/ 的字符串加上前缀
              def repl(m):
                  quote, inner = m.group(1), m.group(2)
                  if inner.startswith("/ui/") or inner == "/" or inner == "":
                      return m.group(0)
                  return f"{quote}/ui/{inner.lstrip('/')}{quote}"
              return re.sub(r"(['\"])(/[^\s'\"]*)\1", repl, body)

          new_src, n = pattern.subn(
              lambda m: m.group(1) + add_prefix(m.group(2)) + m.group(3),
              src
          )

          if n == 0:
              print("ℹ️  pagePaths block not matched (file structure changed?) — skipping")
          else:
              p.write_text(new_src, encoding="utf-8")
              print(f"✅ Patched {p} — {n} replacements")
          # 打印结果供调试
          print("---- pagePaths after patch ----")
          for line in new_src.splitlines():
              if "pagePaths" in line or "/ui/" in line:
                  print(line)

          # ============================================================
          # 边界情况：把 /ui（无尾随路径）和 /ui/index.html 视为 dashboard 首页
          #
          # 背景：_redirects 把 /ui/* rewrite 到 /ui/（结尾带斜杠），但用户
          # 直接访问 /ui 或 /ui/index.html 时，pageFromPathname 找不到对应
          # 页面会回落到 dashboard，但 isKnownAppPath 也会返回 false，
          # 导致 syncRoute 调用 replaceState 把 URL 改写为 /ui/dashboard，
          # 地址栏非预期跳变。同时上游原始 pageFromPathname/isKnownAppPath
          # 只判断 `/` 和 `/index.html`，不知道 /ui 子目录的存在。
          #
          # 方案：在两个函数体内 `const clean = normalizePath(pathname);` 之后
          # 幂等地插入对 /ui 和 /ui/index.html 的判断（放在 return 流之前，
          # 避免产生死代码）。如果检测到已存在则跳过，保证多次同步不会重复
          # 插入或破坏已有结构。选择 const 行作为锚点是因为两个目标函数都以
          # 这一行为首行（normalizePath 调用），且不会与 pagePaths 内的字符串
          # 字面量混淆。
          # ============================================================
          EDGE_SNIPPET_PFP = (
              "  // `/ui`（无尾随路径）等价于 dashboard 首页\n"
              "  if (clean === '/ui' || clean === '/ui/index.html') return 'dashboard';\n"
          )
          EDGE_SNIPPET_IKAP = (
              "  // `/ui`（无尾随路径）是 React UI 的入口目录\n"
              "  if (clean === '/ui' || clean === '/ui/index.html') return true;\n"
          )

          # 重新读最新内容（前一步可能已 write_text）
          src = p.read_text(encoding="utf-8")

          def inject_after_const_clean(func_header: str, snippet: str, marker: str) -> int:
              """在 func_header 函数体中的 `const clean = normalizePath(...);` 行后
              幂等插入 snippet（即 edge case 的 if 分支）。"""
              nonlocal src
              if marker in src:
                  return 0
              m = re.search(
                  re.escape(func_header) + r"[^\n]*\n(?P<body>(?:.*\n)*?)\}",
                  src
              )
              if not m:
                  print(f"⚠️  `{func_header}` 未匹配，跳过 edge 注入")
                  return 0
              body = m.group("body")
              const_match = re.search(
                  r"^(\s*)const clean\s*=\s*normalizePath\([^)]*\);\n",
                  body,
                  re.MULTILINE
              )
              if not const_match:
                  print(f"⚠️  `{func_header}` 体中未找到 `const clean = normalizePath(...)`，跳过 edge 注入")
                  return 0
              idx = m.start("body") + const_match.end()
              src = src[:idx] + snippet + src[idx:]
              return 1

          total_edge = 0
          total_edge += inject_after_const_clean(
              "export function pageFromPathname",
              EDGE_SNIPPET_PFP,
              "clean === '/ui' || clean === '/ui/index.html') return 'dashboard'"
          )
          total_edge += inject_after_const_clean(
              "export function isKnownAppPath",
              EDGE_SNIPPET_IKAP,
              "clean === '/ui' || clean === '/ui/index.html') return true"
          )

          if total_edge > 0:
              p.write_text(src, encoding="utf-8")
              print(f"✅ Injected /ui edge-case handling — {total_edge} inserts")
          else:
              print("ℹ️  /ui edge-case handling already present, no injection needed")
          print("---- edge-case helpers after patch ----")
          for line in src.splitlines():
              if "/ui'" in line or "/ui/index" in line:
                  print(line)
          PY

      - name: Check for changes
        if: steps.probe.outputs.skip == 'false'
        id: diff
        run: |
          git add ui/src
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✓ No content diff after sync"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✓ Content changed, will commit"
          fi

      - name: Commit changes
        if: steps.probe.outputs.skip == 'false' && steps.diff.outputs.changed == 'true'
        run: |
          git commit -m "chore(sync): ui/ synced from upstream HydraLLM@${{ steps.probe.outputs.upstream_sha }}

          自动同步自 https://github.com/clockclock1/HydraLLM
          上游 commit: ${{ steps.probe.outputs.upstream_sha }}"

      - name: Push to main
        if: steps.probe.outputs.skip == 'false' && steps.diff.outputs.changed == 'true'
        run: |
          git push origin main
          echo "✓ Pushed to main — Cloudflare Pages Git 集成将自动触发部署"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.probe.outputs.skip }}" = "true" ]; then
            echo "### ✅ 无需同步 — 上游 HydraLLM HEAD 未变化" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "### ✅ 同步完成 — 已推送 main 分支，CF Pages 自动部署中" >> $GITHUB_STEP_SUMMARY
            echo "上游 commit: \`${{ steps.probe.outputs.upstream_sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⏭️ 已克隆上游但内容无变化" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/hydra