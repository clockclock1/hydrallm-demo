name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 06:00 自动检查上游并构建（北京时间 14:00）
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    name: Sync upstream & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 拉取上游 HydraLLM 最新 ui/ 目录（只覆盖 React UI 源码）
      - name: Sync ui/ from upstream HydraLLM
        run: |
          set -e
          echo "::group::Fetch upstream HydraLLM ui/"
          git clone --depth 1 https://github.com/clockclock1/HydraLLM.git /tmp/hydra
          # 保留我们对 vite.config.ts 和 index.html 的修改（构建需要 base=/ui/）
          cp -r /tmp/hydra/ui/src/* ui/src/
          # 同步依赖清单，便于 UI 大版本更新时跟进
          cp /tmp/hydra/ui/package.json ui/package.upstream.json
          rm -rf /tmp/hydra
          echo "::endgroup::"
          echo "✓ ui/ synced from upstream HydraLLM"

      - name: Build (Vue + React UI + SW)
        run: npm install && npm run build

      - name: Verify dist structure
        run: |
          echo "=== dist ==="
          find dist -type f | sort
          test -f dist/index.html && echo "✓ Vue landing"
          test -f dist/ui/index.html && echo "✓ React UI"
          test -f dist/sw.js && echo "✓ Service Worker"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: hydrallm-demo
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}